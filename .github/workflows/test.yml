name: Tests
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  static:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency: testing_environment
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Tflint Setup
        uses: terraform-linters/setup-tflint@v6

      - name: Terraform Docs Setup
        run: |
          mkdir terraform-docs && cd terraform-docs
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.18.0/terraform-docs-v0.18.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          echo "$GITHUB_WORKSPACE/terraform-docs" >> $GITHUB_PATH

      - name: Pre-commit Checks
        uses: pre-commit/action@v3.0.1

      - name: Terraform Init
        run: terraform init -input=false -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Set short SHA
        if: always()
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Webex Notification
        if: always() && github.event_name != 'pull_request'
        uses: qsnyder/action-wxt@master
        env:
          TOKEN: ${{ secrets.WEBEX_TOKEN }}
          ROOMID: ${{ secrets.WEBEX_ROOM_ID }}
          MESSAGE: |
            ## ${{ job.status == 'success' && '✅' || '❌' }} NaC IOS-XE Module Pipeline ${{ job.status == 'success' && 'Passed' || 'Failed' }}

            ---
            **Build Information:**
            * **Pipeline:** ${{ github.repository }}
            * **Run:** [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            * **Branch:** `${{ github.ref_name }}`
            * **Event:** ${{ github.event_name }}
            * **Context:** **main** — Pre-commit + Terraform Init + Validate

            **Git Information:**
            * **Commit:** [`${{ env.SHORT_SHA }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — _${{ github.event.head_commit.message }}_
            * **Author:** ${{ github.event.head_commit.author.name }}

            **Pipeline Stages:**
            * **Pre-commit:** tflint, terraform-fmt, terraform-docs
            * **Terraform Init:** provider and module initialization
            * **Terraform Validate:** configuration syntax validation

            **Quick Links:**
            * [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) | [Commit Diff](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
